services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_DATABASE:-doit_dev}
    volumes:
      - doit_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      MIX_ENV: dev
      PHX_SERVER: "true"
      PORT: "4000"
      DB_HOSTNAME: db
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_DATABASE: ${DB_DATABASE:-doit_dev}
    ports:
      - "${WEB_PORT:-4000}:4000"
    volumes:
      - .:/app
      - doit_build:/app/_build
      - doit_deps:/app/deps
      - doit_node_modules:/app/assets/node_modules

  # Playwright server for browser (e2e) tests — not part of the normal stack:
  #   docker compose --profile test up -d playwright
  # The web image stays Alpine; the browser needs glibc, so it runs here and
  # tests connect over websocket (see test/test_helper.exs).
  playwright:
    image: mcr.microsoft.com/playwright:v1.58.0-noble
    init: true
    user: pwuser
    working_dir: /home/pwuser
    command: npx -y playwright@1.58.0 run-server --port 3000 --host 0.0.0.0
    profiles: ["test"]

volumes:
  doit_pgdata:
  doit_build:
  doit_deps:
  doit_node_modules:
